<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>币安平台币数据看板</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #090c12;
      --panel: #111722;
      --panel-2: #171f2d;
      --line: #263247;
      --text: #eef3fb;
      --muted: #8f9db2;
      --gold: #f0b90b;
      --green: #20c997;
      --red: #ff6b6b;
      --blue: #62a8ff;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 12% -10%, rgba(240, 185, 11, .12), transparent 30rem),
        radial-gradient(circle at 100% 20%, rgba(98, 168, 255, .09), transparent 32rem),
        var(--bg);
      color: var(--text);
    }

    .wrap { width: min(1500px, 96vw); margin: 0 auto; padding: 34px 0 60px; }
    header { display: flex; justify-content: space-between; gap: 24px; align-items: end; margin-bottom: 24px; }
    h1 { margin: 0 0 8px; font-size: clamp(26px, 4vw, 44px); letter-spacing: -.04em; }
    .subtitle { color: var(--muted); margin: 0; line-height: 1.6; }
    .actions { display: flex; gap: 10px; flex-wrap: wrap; justify-content: flex-end; }

    button, select, input {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--text);
      border-radius: 10px;
      padding: 10px 12px;
      font: inherit;
    }
    button { cursor: pointer; font-weight: 700; }
    button.primary { background: var(--gold); border-color: var(--gold); color: #171100; }
    button:disabled { cursor: wait; opacity: .65; }
    input { min-width: 220px; }

    .status {
      display: flex;
      align-items: center;
      gap: 9px;
      margin-bottom: 16px;
      min-height: 24px;
      color: var(--muted);
      font-size: 14px;
    }
    .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--muted); }
    .dot.loading { background: var(--gold); box-shadow: 0 0 0 5px rgba(240,185,11,.12); }
    .dot.ok { background: var(--green); }
    .dot.error { background: var(--red); }

    .stats { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 12px; margin-bottom: 16px; }
    .stat { background: linear-gradient(145deg, var(--panel), var(--panel-2)); border: 1px solid var(--line); border-radius: 14px; padding: 16px; }
    .stat span { display: block; color: var(--muted); font-size: 13px; margin-bottom: 8px; }
    .stat strong { font-size: 23px; }

    .toolbar { display: flex; gap: 10px; flex-wrap: wrap; margin: 16px 0; }
    .table-shell { border: 1px solid var(--line); border-radius: 14px; overflow: auto; background: rgba(17,23,34,.88); }
    table { width: 100%; border-collapse: collapse; min-width: 1320px; }
    th, td { padding: 13px 12px; border-bottom: 1px solid var(--line); text-align: right; white-space: nowrap; }
    th { position: sticky; top: 0; z-index: 1; color: var(--muted); background: #141b27; font-size: 12px; letter-spacing: .02em; }
    th:first-child, td:first-child, th:nth-child(2), td:nth-child(2), th:nth-child(3), td:nth-child(3) { text-align: left; }
    tbody tr:hover { background: rgba(98,168,255,.055); }
    tbody tr:last-child td { border-bottom: 0; }
    .symbol { font-weight: 850; font-size: 15px; }
    .platform { color: var(--muted); font-size: 12px; margin-top: 3px; }
    .tag { display: inline-flex; align-items: center; border: 1px solid var(--line); border-radius: 999px; padding: 4px 8px; font-size: 12px; }
    .tag.core { color: #191300; background: var(--gold); border-color: var(--gold); }
    .tag.watch { color: var(--blue); background: rgba(98,168,255,.08); }
    .yes { color: var(--green); font-weight: 800; }
    .no { color: #66758d; }
    .negative { color: var(--red); }
    .positive { color: var(--green); }
    .empty { padding: 50px 20px; color: var(--muted); text-align: center !important; }
    .note { margin: 16px 2px 0; color: var(--muted); font-size: 13px; line-height: 1.7; }
    .note a { color: var(--blue); }

    @media (max-width: 820px) {
      .wrap { width: min(94vw, 1500px); padding-top: 22px; }
      header { align-items: stretch; flex-direction: column; }
      .actions { justify-content: flex-start; }
      .stats { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      input { flex: 1; min-width: 160px; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <header>
      <div>
        <h1>币安平台币数据看板</h1>
        <p class="subtitle">浏览器直连 Binance 与 CoinGecko · 核心平台币与观察项目分开展示</p>
      </div>
      <div class="actions">
        <button id="exportBtn">导出 CSV</button>
        <button id="refreshBtn" class="primary">刷新数据</button>
      </div>
    </header>

    <div id="status" class="status"><span class="dot"></span><span>等待加载</span></div>

    <section class="stats">
      <div class="stat"><span>显示项目</span><strong id="visibleCount">—</strong></div>
      <div class="stat"><span>合计流通市值</span><strong id="totalMcap">—</strong></div>
      <div class="stat"><span>币安现货可交易</span><strong id="spotCount">—</strong></div>
      <div class="stat"><span>币安永续合约可交易</span><strong id="futuresCount">—</strong></div>
    </section>

    <section class="toolbar">
      <input id="searchInput" type="search" placeholder="搜索代币或平台…" />
      <select id="categoryFilter">
        <option value="all">全部类别</option>
        <option value="CEX">中心化平台</option>
        <option value="PERP">永续/衍生品 DEX</option>
        <option value="DEX">现货 DEX/聚合器</option>
        <option value="SPECIAL">特殊交易平台</option>
      </select>
      <select id="levelFilter">
        <option value="core">仅核心名单</option>
        <option value="all">核心＋观察</option>
        <option value="watch">仅观察项目</option>
      </select>
      <select id="marketFilter">
        <option value="all">全部币安市场</option>
        <option value="spot">有现货</option>
        <option value="futures">有永续合约</option>
        <option value="both">现货＋合约</option>
      </select>
    </section>

    <div class="table-shell">
      <table>
        <thead>
          <tr>
            <th>代币 / 平台</th>
            <th>类别</th>
            <th>级别</th>
            <th>现货</th>
            <th>合约</th>
            <th>现价</th>
            <th>24h</th>
            <th>流通市值</th>
            <th>ATH / 日期</th>
            <th>ATL / 日期</th>
            <th>流通量</th>
            <th>总量 / 上限</th>
            <th>流通率</th>
            <th>发行信息</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr><td class="empty" colspan="14">正在加载数据…</td></tr>
        </tbody>
      </table>
    </div>

    <p class="note">
      行情、历史高低点与供应量来自 <a href="https://www.coingecko.com/" target="_blank" rel="noreferrer">CoinGecko</a>；
      交易状态来自 Binance 官方现货及 U 本位合约接口。发行价并非行情接口的标准字段，目前仅展示人工核实项。
      免费接口可能限流；若直接双击打开出现跨域错误，请使用本地静态服务器打开。
    </p>
  </main>

  <script>
    const projects = [
      { symbol: "BNB", id: "binancecoin", category: "CEX", categoryName: "中心化平台", platform: "Binance", level: "core", issue: "约 $0.15 · ICO 2017-07" },
      { symbol: "NEXO", id: "nexo", category: "CEX", categoryName: "中心化平台", platform: "Nexo", level: "core", issue: "需人工核实" },

      { symbol: "HYPE", id: "hyperliquid", category: "PERP", categoryName: "永续/衍生品 DEX", platform: "Hyperliquid", level: "core", issue: "无公售价 · 空投 2024-11-29" },
      { symbol: "ASTER", id: "aster-2", category: "PERP", categoryName: "永续/衍生品 DEX", platform: "Aster", level: "core", issue: "需人工核实" },
      { symbol: "LIT", id: "lighter", category: "PERP", categoryName: "永续/衍生品 DEX", platform: "Lighter", level: "core", issue: "需人工核实" },
      { symbol: "DYDX", id: "dydx-chain", category: "PERP", categoryName: "永续/衍生品 DEX", platform: "dYdX", level: "core", issue: "需人工核实" },
      { symbol: "GMX", id: "gmx", category: "PERP", categoryName: "永续/衍生品 DEX", platform: "GMX", level: "core", issue: "需人工核实" },
      { symbol: "SNX", id: "havven", category: "PERP", categoryName: "永续/衍生品 DEX", platform: "Synthetix", level: "core", issue: "需人工核实" },

      { symbol: "UNI", id: "uniswap", category: "DEX", categoryName: "现货 DEX/聚合器", platform: "Uniswap", level: "core", issue: "无公售价 · 空投 2020-09" },
      { symbol: "JUP", id: "jupiter-exchange-solana", category: "DEX", categoryName: "现货 DEX/聚合器", platform: "Jupiter", level: "core", issue: "无公售价 · 空投 2024-01" },
      { symbol: "CAKE", id: "pancakeswap-token", category: "DEX", categoryName: "现货 DEX/聚合器", platform: "PancakeSwap", level: "core", issue: "流动性挖矿启动 2020-09" },
      { symbol: "AERO", id: "aerodrome-finance", category: "DEX", categoryName: "现货 DEX/聚合器", platform: "Aerodrome", level: "core", issue: "需人工核实" },
      { symbol: "CRV", id: "curve-dao-token", category: "DEX", categoryName: "现货 DEX/聚合器", platform: "Curve", level: "core", issue: "DAO发行 2020-08" },
      { symbol: "1INCH", id: "1inch", category: "DEX", categoryName: "现货 DEX/聚合器", platform: "1inch", level: "core", issue: "无公售价 · 空投 2020-12" },
      { symbol: "COW", id: "cow-protocol", category: "DEX", categoryName: "现货 DEX/聚合器", platform: "CoW Protocol", level: "core", issue: "需人工核实" },
      { symbol: "RAY", id: "raydium", category: "DEX", categoryName: "现货 DEX/聚合器", platform: "Raydium", level: "core", issue: "需人工核实" },
      { symbol: "ORCA", id: "orca", category: "DEX", categoryName: "现货 DEX/聚合器", platform: "Orca", level: "core", issue: "需人工核实" },
      { symbol: "RUNE", id: "thorchain", category: "DEX", categoryName: "现货 DEX/聚合器", platform: "THORChain", level: "core", issue: "需人工核实" },

      { symbol: "PENDLE", id: "pendle", category: "SPECIAL", categoryName: "特殊交易平台", platform: "Pendle", level: "core", issue: "需人工核实" },
      { symbol: "PUMP", id: "pump-fun", category: "SPECIAL", categoryName: "特殊交易平台", platform: "Pump.fun / PumpSwap", level: "core", issue: "需人工核实" },

      { symbol: "WOO", id: "woo-network", category: "CEX", categoryName: "中心化/混合平台", platform: "WOO X / WOOFi", level: "watch", issue: "$0.03 · 公售 2020-10-29" },
      { symbol: "CLO", id: "yei-finance", category: "SPECIAL", categoryName: "交易基础设施", platform: "Yei Finance / Clovis", level: "watch", issue: "无可靠公售价 · 2025-10-14上市" },
      { symbol: "SUSHI", id: "sushi", category: "DEX", categoryName: "现货 DEX/聚合器", platform: "Sushi", level: "watch", issue: "流动性挖矿启动 2020-08" }
    ];

    const state = { rows: [], lastUpdated: null };
    const els = {
      status: document.querySelector("#status"),
      refreshBtn: document.querySelector("#refreshBtn"),
      exportBtn: document.querySelector("#exportBtn"),
      search: document.querySelector("#searchInput"),
      category: document.querySelector("#categoryFilter"),
      level: document.querySelector("#levelFilter"),
      market: document.querySelector("#marketFilter"),
      body: document.querySelector("#tableBody"),
      visibleCount: document.querySelector("#visibleCount"),
      totalMcap: document.querySelector("#totalMcap"),
      spotCount: document.querySelector("#spotCount"),
      futuresCount: document.querySelector("#futuresCount")
    };

    function setStatus(type, text) {
      els.status.innerHTML = `<span class="dot ${type}"></span><span>${text}</span>`;
    }

    async function getJson(url) {
      const response = await fetch(url, { headers: { Accept: "application/json" } });
      if (!response.ok) throw new Error(`${response.status} ${response.statusText}`);
      return response.json();
    }

    function compact(value) {
      if (value == null || !Number.isFinite(Number(value))) return "—";
      return new Intl.NumberFormat("zh-CN", { notation: "compact", maximumFractionDigits: 2 }).format(value);
    }

    function usd(value, compactMode = false) {
      if (value == null || !Number.isFinite(Number(value))) return "—";
      if (compactMode) return `$${compact(value)}`;
      const n = Number(value);
      const digits = n >= 1 ? 2 : n >= .01 ? 4 : 6;
      return new Intl.NumberFormat("en-US", { style: "currency", currency: "USD", maximumFractionDigits: digits }).format(n);
    }

    function dateOnly(value) { return value ? value.slice(0, 10) : "—"; }
    function marketMark(active) { return active ? '<span class="yes">✓</span>' : '<span class="no">—</span>'; }

    function filteredRows() {
      const q = els.search.value.trim().toLowerCase();
      return state.rows.filter((row) => {
        const searchOk = !q || `${row.symbol} ${row.platform} ${row.categoryName}`.toLowerCase().includes(q);
        const categoryOk = els.category.value === "all" || row.category === els.category.value;
        const levelOk = els.level.value === "all" || row.level === els.level.value;
        const marketOk =
          els.market.value === "all" ||
          (els.market.value === "spot" && row.binanceSpot) ||
          (els.market.value === "futures" && row.binanceFutures) ||
          (els.market.value === "both" && row.binanceSpot && row.binanceFutures);
        return searchOk && categoryOk && levelOk && marketOk;
      });
    }

    function render() {
      const rows = filteredRows();
      els.visibleCount.textContent = rows.length;
      els.totalMcap.textContent = usd(rows.reduce((sum, row) => sum + (row.marketCap || 0), 0), true);
      els.spotCount.textContent = rows.filter((row) => row.binanceSpot).length;
      els.futuresCount.textContent = rows.filter((row) => row.binanceFutures).length;

      if (!rows.length) {
        els.body.innerHTML = '<tr><td class="empty" colspan="14">没有符合当前条件的项目</td></tr>';
        return;
      }

      els.body.innerHTML = rows.map((row) => {
        const change = row.change24h;
        const changeClass = change == null ? "" : change >= 0 ? "positive" : "negative";
        const supplyBase = row.maxSupply || row.totalSupply;
        const circulation = row.circulatingSupply && supplyBase ? row.circulatingSupply / supplyBase * 100 : null;
        return `
          <tr>
            <td><div class="symbol">${row.symbol}</div><div class="platform">${row.platform}</div></td>
            <td>${row.categoryName}</td>
            <td><span class="tag ${row.level}">${row.level === "core" ? "核心" : "观察"}</span></td>
            <td>${marketMark(row.binanceSpot)}</td>
            <td>${marketMark(row.binanceFutures)}</td>
            <td>${usd(row.currentPrice)}</td>
            <td class="${changeClass}">${change == null ? "—" : `${change >= 0 ? "+" : ""}${change.toFixed(2)}%`}</td>
            <td>${usd(row.marketCap, true)}</td>
            <td>${usd(row.ath)}<div class="platform">${dateOnly(row.athDate)}</div></td>
            <td>${usd(row.atl)}<div class="platform">${dateOnly(row.atlDate)}</div></td>
            <td>${compact(row.circulatingSupply)}</td>
            <td>${compact(row.totalSupply)} / ${compact(row.maxSupply)}</td>
            <td>${circulation == null ? "—" : `${circulation.toFixed(2)}%`}</td>
            <td>${row.issue}</td>
          </tr>`;
      }).join("");
    }

    async function loadData() {
      els.refreshBtn.disabled = true;
      setStatus("loading", "正在连接 Binance 与 CoinGecko…");
      try {
        const ids = projects.map((item) => item.id).join(",");
        const marketUrl = new URL("https://api.coingecko.com/api/v3/coins/markets");
        marketUrl.searchParams.set("vs_currency", "usd");
        marketUrl.searchParams.set("ids", ids);
        marketUrl.searchParams.set("order", "market_cap_desc");
        marketUrl.searchParams.set("per_page", "250");
        marketUrl.searchParams.set("page", "1");
        marketUrl.searchParams.set("sparkline", "false");
        marketUrl.searchParams.set("price_change_percentage", "24h");

        const [spot, futures, markets] = await Promise.all([
          getJson("https://api.binance.com/api/v3/exchangeInfo"),
          getJson("https://fapi.binance.com/fapi/v1/exchangeInfo"),
          getJson(marketUrl.toString())
        ]);

        const spotAssets = new Set(spot.symbols.filter((x) => x.status === "TRADING").map((x) => x.baseAsset));
        const futuresAssets = new Set(futures.symbols.filter((x) => x.status === "TRADING" && x.contractType === "PERPETUAL").map((x) => x.baseAsset));
        const marketById = new Map(markets.map((x) => [x.id, x]));

        state.rows = projects.map((project) => {
          const m = marketById.get(project.id) || {};
          return {
            ...project,
            binanceSpot: spotAssets.has(project.symbol),
            binanceFutures: futuresAssets.has(project.symbol),
            currentPrice: m.current_price,
            change24h: m.price_change_percentage_24h,
            marketCap: m.market_cap,
            ath: m.ath,
            athDate: m.ath_date,
            atl: m.atl,
            atlDate: m.atl_date,
            circulatingSupply: m.circulating_supply,
            totalSupply: m.total_supply,
            maxSupply: m.max_supply
          };
        }).sort((a, b) => (b.marketCap || 0) - (a.marketCap || 0));

        state.lastUpdated = new Date();
        render();
        setStatus("ok", `更新成功 · ${state.lastUpdated.toLocaleString("zh-CN", { hour12: false })}`);
      } catch (error) {
        console.error(error);
        setStatus("error", `加载失败：${error.message}。可能是接口限流、网络或浏览器跨域限制。`);
        els.body.innerHTML = '<tr><td class="empty" colspan="14">数据加载失败，请稍后刷新，或通过本地静态服务器打开此页面。</td></tr>';
      } finally {
        els.refreshBtn.disabled = false;
      }
    }

    function csvCell(value) { return `"${String(value ?? "").replaceAll('"', '""')}"`; }
    function exportCsv() {
      const rows = filteredRows();
      const header = ["代币", "平台", "类别", "级别", "币安现货", "币安合约", "现价USD", "24h%", "市值USD", "ATH", "ATH日期", "ATL", "ATL日期", "流通量", "总量", "最大量", "发行信息"];
      const lines = [header, ...rows.map((r) => [
        r.symbol, r.platform, r.categoryName, r.level === "core" ? "核心" : "观察",
        r.binanceSpot ? "是" : "否", r.binanceFutures ? "是" : "否", r.currentPrice, r.change24h,
        r.marketCap, r.ath, dateOnly(r.athDate), r.atl, dateOnly(r.atlDate), r.circulatingSupply,
        r.totalSupply, r.maxSupply, r.issue
      ])].map((row) => row.map(csvCell).join(","));

      const blob = new Blob(["\ufeff" + lines.join("\n")], { type: "text/csv;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `platform-tokens-${new Date().toISOString().slice(0, 10)}.csv`;
      a.click();
      URL.revokeObjectURL(url);
    }

    [els.search, els.category, els.level, els.market].forEach((el) => el.addEventListener("input", render));
    els.refreshBtn.addEventListener("click", loadData);
    els.exportBtn.addEventListener("click", exportCsv);
    loadData();
  </script>
</body>
</html>
